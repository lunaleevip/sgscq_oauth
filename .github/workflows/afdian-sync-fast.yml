name: Fast Afdian Sponsor Sync

on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Run full Afdian crawl instead of recent order incremental sync"
        required: false
        default: "false"
  repository_dispatch:
    types: [afdian_order, afdian_incremental]
  schedule:
    - cron: "2,12,22,32,42,52 * * * *"

concurrency:
  group: afdian-sponsors-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OAuth static repo
        uses: actions/checkout@v4

      - name: Use latest target branch
        shell: bash
        run: |
          set -euo pipefail
          target_branch="${GITHUB_REF_NAME:-master}"
          git fetch origin "${target_branch}"
          git checkout "${target_branch}"
          git reset --hard "origin/${target_branch}"

      - name: Merge Afdian webhook user cache
        if: github.event.action == 'afdian_order'
        env:
          OAUTH_REPO_PATH: ${{ github.workspace }}
        run: python tools/afdian_webhook_merge.py

      - name: Sync recent Afdian orders
        if: github.event_name == 'schedule' || github.event.action == 'afdian_incremental' || (github.event_name == 'workflow_dispatch' && github.event.inputs.full_sync != 'true')
        env:
          AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
          AFDIAN_API_BASE: https://ifdian.net
          AFDIAN_INCREMENTAL_MAX_PAGES: 5
          OAUTH_REPO_PATH: ${{ github.workspace }}
        run: python tools/afdian_orders_incremental.py

      - name: Sync full Afdian snapshot
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.full_sync == 'true'
        env:
          AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
          AFDIAN_API_BASE: https://ifdian.net
          OAUTH_REPO_PATH: ${{ github.workspace }}
        run: python tools/afdian_sponsors_dump.py

      - name: Commit and push snapshot
        shell: bash
        run: |
          set -euo pipefail

          target_branch="${GITHUB_REF_NAME:-master}"
          paths=(afdian/entitlements.json afdian/top100.json afdian/users afdian/sponsors.compact.txt afdian/order_checkpoint.json)

          has_changes() {
            ! git diff --quiet -- "${paths[@]}" || \
              [ -n "$(git ls-files --others --exclude-standard -- afdian/users)" ]
          }

          if ! has_changes; then
            echo "No Afdian snapshot changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- "${paths[@]}"
          git stash push --include-untracked --message afdian-snapshot -- "${paths[@]}"
          git pull --rebase origin "${target_branch}"
          git stash pop

          git add -A -- "${paths[@]}"
          if git diff --cached --quiet -- "${paths[@]}"; then
            echo "No Afdian snapshot changes after rebase."
            exit 0
          fi

          git commit -m "chore: sync afdian sponsors"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${target_branch}"; then
              exit 0
            fi
            if [ "${attempt}" = "3" ]; then
              echo "Push failed after ${attempt} attempts."
              exit 1
            fi
            git pull --rebase origin "${target_branch}"
          done
