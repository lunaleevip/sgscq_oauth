name: Sync Afdian Sponsors

on:
  workflow_dispatch:
  repository_dispatch:
    types: [afdian_order]
  schedule:
    - cron: "17 */2 * * *"

concurrency:
  group: afdian-sponsors-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OAuth static repo
        uses: actions/checkout@v4

      - name: Merge Afdian webhook user cache
        if: github.event_name == 'repository_dispatch'
        env:
          OAUTH_REPO_PATH: ${{ github.workspace }}
        run: python tools/afdian_webhook_merge.py

      - name: Sync Afdian snapshot
        if: github.event_name != 'repository_dispatch'
        env:
          AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
          AFDIAN_API_BASE: https://ifdian.net
          OAUTH_REPO_PATH: ${{ github.workspace }}
        run: python tools/afdian_sponsors_dump.py

      - name: Commit and push snapshot
        shell: bash
        run: |
          set -euo pipefail

          target_branch="${GITHUB_REF_NAME:-master}"
          paths=(afdian/entitlements.json afdian/top100.json afdian/users afdian/sponsors.compact.txt)

          has_changes() {
            ! git diff --quiet -- "${paths[@]}" || \
              [ -n "$(git ls-files --others --exclude-standard -- afdian/users)" ]
          }

          if ! has_changes; then
            echo "No Afdian snapshot changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- "${paths[@]}"
          git stash push --include-untracked --message afdian-snapshot -- "${paths[@]}"
          git pull --rebase origin "${target_branch}"
          git stash pop

          git add -A -- "${paths[@]}"
          if git diff --cached --quiet -- "${paths[@]}"; then
            echo "No Afdian snapshot changes after rebase."
            exit 0
          fi

          git commit -m "chore: sync afdian sponsors"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${target_branch}"; then
              exit 0
            fi
            if [ "${attempt}" = "3" ]; then
              echo "Push failed after ${attempt} attempts."
              exit 1
            fi
            git pull --rebase origin "${target_branch}"
          done
