name: Update follower snapshot

# 每 5 分钟自动 dump 一次粉丝列表，commit 并 push 回主分支。
# 手动触发：Actions → Update follower snapshot → Run workflow。
on:
  schedule:
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'
  workflow_dispatch:

permissions:
  contents: write   # 允许 push 回当前仓库

concurrency:
  group: bili-dump
  cancel-in-progress: false

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run dump
        env:
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
          BILI_UP_MID: '173883695'
        run: |
          if [ -z "$BILI_COOKIE" ]; then
            echo "::error::secret BILI_COOKIE is not set; please add it under repo Settings → Secrets and variables → Actions"
            exit 1
          fi
          python scripts/bili_followers_dump.py

      - name: Commit & push if changed
        shell: bash
        run: |
          set -euo pipefail

          target_branch="${GITHUB_REF_NAME:-master}"
          paths=(bilibili/followers.json bilibili/followers.compact.txt)

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git add -A -- "${paths[@]}"
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git stash push --include-untracked --message bili-followers -- "${paths[@]}"
          git pull --rebase origin "${target_branch}"
          git stash pop

          git add -A -- "${paths[@]}"
          if git diff --cached --quiet; then
            echo "No changes after rebase."
            exit 0
          fi

          git commit -m "chore: follower snapshot $(date -u +'%Y-%m-%d %H:%MZ')"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${target_branch}"; then
              exit 0
            fi
            if [ "${attempt}" = "3" ]; then
              echo "Push failed after ${attempt} attempts."
              exit 1
            fi
            git pull --rebase origin "${target_branch}"
          done
